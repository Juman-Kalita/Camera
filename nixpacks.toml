[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "libGL", "glib", "libgcc"]

[phases.install]
cmds = ["python3.12 -m pip install --upgrade pip", "python3.12 -m pip install -r requirements-deploy.txt"]

[phases.build]
cmds = ["echo 'Build complete'"]

[start]
cmd = "cd backend && python3.12 -m uvicorn main:app --host 0.0.0.0 --port $PORT"
